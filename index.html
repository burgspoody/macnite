<!DOCTYPE html>
<html>
    <head>
        <title>MacNite</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="assets/macnite-icons/macnite-icon-256x256.png">
    </head>
    <body>
        <main>
            <section id="hero">
                <h1 id="h1" class="heading">MacNite</h1>
                <h2 class="heading">The hassle-free app installer for macOS.</h2>
                <header>
                    <nav>
                        <a href="https://github.com/burgSpoody/MacNite/blob/310f74b5aadcd78860cb0bf9113af39694dc6765/README.md">About</a>
                        <a href="https://github.com/burgSpoody/MacNite">GitHub</a>
                        <a href="https://github.com/burgSpoody">burgSpoody</a>
                        <a href="tutorial.html">How to use MacNite</a>
                    </nav>
                </header>
                <p>Install all your apps without downloading and installing them individually.</p>
            <p>Click any app icon to select it for installation.</p>
            <section id="app-selection"></section>
            <br>
            <section id="install">
                <p id="selected-count">0 apps selected</p>
                <div id="button-row">
                    <button id="install-btn">Get your MacNite</button>
                    <button id="launch-macnite">Click after installing MacNite</button>
                </div>
            </section>
        </main>
        <script src="script.js"></script>
    </body>
</html>
